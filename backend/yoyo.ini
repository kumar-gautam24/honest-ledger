# yoyo-migrations config. `yoyo apply` reads this automatically.
# The database URL comes from the DATABASE_URL env var (see .env / .env.example) so we
# never hardcode credentials here. yoyo uses a SYNC driver for migrations, hence the
# postgresql:// scheme resolves to psycopg2 (installed as a dependency).
[DEFAULT]
sources = migrations
database = %(DATABASE_URL)s
batch_mode = on
verbosity = 1
# Where yoyo records which migrations have run:
migration_table = _yoyo_migration
