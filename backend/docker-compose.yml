# Local dev stack: Postgres + the API. `docker compose up --build`.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: recurring
      POSTGRES_PASSWORD: recurring
      POSTGRES_DB: recurring
    volumes:
      - dbdata:/var/lib/postgresql/data   # named volume => data survives restarts
    ports:
      - "5432:5432"                        # exposed so you can inspect with psql/GUI
    healthcheck:
      # api waits until Postgres actually accepts connections, not just "started".
      test: ["CMD-SHELL", "pg_isready -U recurring -d recurring"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build: .
    env_file: .env            # DATABASE_URL etc. (copy from .env.example first)
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  dbdata:
