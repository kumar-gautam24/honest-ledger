name: recurring
description: "Recurring — personal finance tracker: recurring obligations, EMI/no-cost-EMI calculators, and a money-leak borrowing tracker."
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.12.2

dependencies:
  collection: ^1.19.0
  dio: ^5.10.0
  drift: ^2.34.0
  flutter:
    sdk: flutter
  flutter_local_notifications: ^22.0.1
  flutter_riverpod: ^3.3.2
  fpdart: ^1.2.0
  freezed_annotation: ^3.1.0
  flutter_secure_storage: ^9.2.4
  get_it: ^9.2.1
  go_router: ^17.3.0
  google_fonts: ^8.1.0
  intl: ^0.20.3
  json_annotation: ^4.12.0
  path_provider: ^2.1.6
  riverpod_annotation: ^4.0.3
  shared_preferences: ^2.5.5
  sqlite3_flutter_libs: ^0.6.0+eol
  timezone: ^0.11.1
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.4
  drift_dev: ^2.34.0
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.14.0
  flutter_native_splash: ^2.4.8
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

# Dark-first branded splash: the Leak Loop mark on the "ink" base color.
# SVG masters live in assets/brand/; PNGs are rasterized with rsvg-convert.
flutter_native_splash:
  color: "#0E1116"
  color_dark: "#0E1116"
  image: assets/brand/png/splash-mark-576.png
  image_dark: assets/brand/png/splash-mark-576.png
  android_12:
    color: "#0E1116"
    color_dark: "#0E1116"
    image: assets/brand/png/splash-mark-1152.png
    image_dark: assets/brand/png/splash-mark-1152.png
  android: true
  ios: true
  web: false

# App icons generated from the brand masters: dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: assets/brand/png/icon-1024.png
  android: true
  adaptive_icon_background: "#0E1116"
  adaptive_icon_foreground: assets/brand/png/icon-foreground-1024.png
  adaptive_icon_monochrome: assets/brand/png/icon-monochrome-1024.png
  ios: true
  remove_alpha_ios: true
  macos:
    generate: true
    image_path: assets/brand/png/icon-1024.png
  web:
    generate: true
    image_path: assets/brand/png/icon-1024.png
    background_color: "#0E1116"
    theme_color: "#C9A227"
